@if (multiSelect) {
<button class="btn btn-primary mb-1" (click)="resetSelection()">
  Reset Selection
</button>
} @if (multiSelect) {
<button class="btn btn-primary ms-1 mb-1" (click)="selectAll()">
  Select All
</button>
}
<div class="form-check">
  <input
    [formControl]="includeSoldAnimalsFormControl"
    class="form-check-input"
    type="checkbox"
    value=""
    id="includeSoldAnimals"
  />
  <label class="form-check-label" for="includeSoldAnimals">
    Display Sold Animals
  </label>
</div>
@if (searchedAnimals$ | async; as animals) {
<ul class="list-group cms-list" id="animalList" [formGroup]="searchBarGroup">
  <input
    class="list-group-item animal-button cms-sticky"
    type="text"
    placeholder="Search..."
    formControlName="searchBar"
  />
  @for ( animal of animals | animalDobSort : sortOldToYoung : sortYoungToOld ;
  track animal) {
  <button
    class="list-group-item list-group-item-action d-flex justify-content-between align-items-center animal-button"
    [ngClass]="getCSSForButton(animal)"
    (click)="selectAnimal(animal)"
  >
    @if (isAnimal(animal)) { 
      @if (!animal.name && !animal.managementTag) {
    <span class="me-1"
      ><strong>
        {{ animal.tagNumber | tagNumberDisplay }}
      </strong></span
    >
    }
    <ul class="me-1 list-group list-group-flush">
      @if (animal.name || animal.managementTag) {
      <li class="list-group">
        <strong>
          {{ animal.tagNumber | tagNumberDisplay }}
        </strong>
      </li>
      @if (animal.name) {
      <li class="list-group">
        {{ animal.name }}
      </li>
      } @if (animal.managementTag) {
      <li class="list-group">
        {{ animal.managementTag }}
      </li>
      } } @if (isSold(animal)) {
      <li class="list-group">
        <img class="sold-tag" src="assets/soldTag.svg" alt="SoldTag" />
      </li>
      }
    </ul>
    } @else { 
      @if (!animal.name) {
    <span class="me-1"
      ><strong>
        {{ animal.tagNumber | tagNumberDisplay }}
      </strong></span
    >
    }
    <ul class="me-1 list-group list-group-flush">
      @if (animal.name ) {
      <li class="list-group">
        <strong>
          {{ animal.tagNumber | tagNumberDisplay }}
        </strong>
      </li>
      @if (animal.name) {
      <li class="list-group">
        {{ animal.name }}
      </li>
      } 
    } @if (isSold(animal)) {
      <li class="list-group">
        <img class="sold-tag" src="assets/soldTag.svg" alt="SoldTag" />
      </li>
      }
    </ul>
    } @if (page !== 'registration') {
    <span
      class="btn badge bg-info rounded-pill align-self-center"
      (click)="openEditModal(animal)"
      >Edit {{ pillButtonText }}</span
    >
    } @if (pillButtonText === 'Animal') {
    <span></span>
    } @if (pillButtonText !== 'Animal') {
    <span
      class="btn badge bg-success rounded-pill ms-1"
      (click)="openAddModal(animal)"
      >{{ page === "registration" ? "" : "Add" }} {{ pillButtonText }}</span
    >
    } @if (page === 'registration') {
    <span></span>
    }
  </button>
  }
</ul>
}
<cms-warning-display></cms-warning-display>
